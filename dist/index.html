<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INTS CST 재고관리</title>
    <!-- Firebase 도메인 미리 연결 -->
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Malgun Gothic', '맑은 고딕', -apple-system, sans-serif; background: #0f172a; }
      #root:empty::after {
        content: '';
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #0f172a;
      }
      #splash {
        position: fixed; inset: 0; background: #0f172a;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 16px;
        z-index: 9999; transition: opacity 0.3s;
      }
      #splash .icon { font-size: 48px; }
      #splash .title { color: #fff; font-size: 20px; font-weight: 800; font-family: 'Malgun Gothic', sans-serif; }
      #splash .sub { color: #64748b; font-size: 13px; font-family: 'Malgun Gothic', sans-serif; }
      #splash .bar { width: 160px; height: 3px; background: #1e293b; border-radius: 10px; overflow: hidden; margin-top: 8px; }
      #splash .bar-inner { height: 100%; background: #3b82f6; border-radius: 10px; animation: load 1.2s ease-in-out forwards; }
      @keyframes load { from { width: 0% } to { width: 100% } }
    </style>
    <style>
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); }
      70%  { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
      100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
    }
  </style>
  <script type="module" crossorigin src="/assets/index-E52LDWac.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/react-vendor-Dh6ppCC2.js">
  <link rel="modulepreload" crossorigin href="/assets/firebase-CnxyVkuB.js">
</head>
  <body>
    <div id="splash">
      <div class="icon">⚙</div>
      <div class="title">INTS CST 재고관리</div>
      <div class="sub">로딩 중...</div>
      <div class="bar"><div class="bar-inner"></div></div>
    </div>
    <div id="root"></div>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash')
          if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 300) }
        }, 800)
      })
    </script>
  </body>
</html>
